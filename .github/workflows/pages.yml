name: Deploy and verify candidate vision

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Install audit dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install beautifulsoup4 pypdf

      - name: Verify positioning and routing source
        run: |
          python scripts/test_positive_positioning.py
          python scripts/test_routing_source.py
          node scripts/test_routing_logic.js

      - name: Verify PDF contracts
        run: |
          python - <<'PY'
          from pathlib import Path
          from pypdf import PdfReader

          expected = {
              'Russell-Dudek-ARMADA-Resume.pdf': 2,
              'Russell-Dudek-ARMADA-Cover-Letter.pdf': 1,
              'Russell-Dudek-ARMADA-Interview-Brief.pdf': 3,
              'Russell-Dudek-ARMADA-90-Day-Plan.pdf': 2,
              'Russell-Dudek-ARMADA-Outcome-Cross-Dock.pdf': 1,
              'Russell-Dudek-ARMADA-Public-Source-Notes.pdf': 1,
          }
          banned = (
              'the hard objection',
              'strongest hiring objection',
              'do not blur the gap',
              'does not support claiming',
              'primary gap to test',
              'the credible case is adjacent',
              'capability gaps',
          )
          for name, page_count in expected.items():
              path = Path('docs') / name
              reader = PdfReader(str(path))
              assert len(reader.pages) == page_count, (name, len(reader.pages))
              text = '\n'.join(page.extract_text() or '' for page in reader.pages).lower()
              for phrase in banned:
                  assert phrase not in text, f'{phrase!r} remains in {name}'
          print('PDF contracts and positive positioning passed')
          PY

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload static campaign
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify live affirmative positioning
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          set -euo pipefail
          base="${PAGE_URL%/}/"
          fetch_retry() {
            local url="$1"
            local output="$2"
            for attempt in $(seq 1 30); do
              if curl --silent --show-error --fail --location "$url" --output "$output"; then
                return 0
              fi
              sleep 5
            done
            echo "Live verification failed for $url" >&2
            return 1
          }

          mkdir -p /tmp/armada-live
          fetch_retry "${base}index.html" /tmp/armada-live/index.html
          fetch_retry "${base}90-day-plan.html" /tmp/armada-live/90-day-plan.html
          fetch_retry "${base}docs/Russell-Dudek-ARMADA-90-Day-Plan.pdf" /tmp/armada-live/plan.pdf

          grep -q "Microsoft analytics advantage" /tmp/armada-live/index.html
          grep -q "Platform fluency. Product judgment. Operating follow-through." /tmp/armada-live/index.html
          grep -q "capability priorities, and capacity choices" /tmp/armada-live/index.html
          grep -q "capability priorities, and recommended capacity allocation" /tmp/armada-live/90-day-plan.html

          ! grep -Eiq "hard objection|strongest hiring objection|do not blur the gap|does not support claiming|primary gap to test|credible case is adjacent|capability gaps" /tmp/armada-live/index.html /tmp/armada-live/90-day-plan.html
          cmp docs/Russell-Dudek-ARMADA-90-Day-Plan.pdf /tmp/armada-live/plan.pdf

          echo "Live affirmative positioning and PDF byte match passed"
